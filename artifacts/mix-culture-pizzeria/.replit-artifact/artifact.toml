kind = "web"
previewPath = "/"
title = "The Mix Culture Pizzeria"
version = "1.0.0"
id = "artifacts/mix-culture-pizzeria"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18291
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/mix-culture-pizzeria run dev"

[services.env]
PORT = "18291"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/mix-culture-pizzeria", "run", "build"]
publicDir = "artifacts/mix-culture-pizzeria/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
